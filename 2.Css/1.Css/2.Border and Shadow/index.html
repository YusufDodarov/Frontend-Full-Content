<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Border ва Shadow Мисол</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Мисолҳои Border ва Shadow</h1>

    <!-- Border мисолҳо -->
    <div class="border-solid">Border Соҳилӣ (solid)</div>
    <div class="border-dashed">Border Хаттасон (dashed)</div>
    <div class="border-dotted">Border Нуқта (dotted)</div>
    <div class="border-double">Border Дукарата (double)</div>
    <div class="border-groove">Border Грув (groove)</div>
    <div class="border-ridge">Border Ридж (ridge)</div>
    <div class="border-inset">Border Инсет (inset)</div>
    <div class="border-outset">Border Аутсет (outset)</div>
    <div class="border-none">Border Нест (none)</div>

    <!-- Shadow мисолҳо -->
    <div class="box-shadow-small">Box Shadow Кичик</div>
    <div class="box-shadow-medium">Box Shadow Миёна</div>
    <div class="box-shadow-large">Box Shadow Калон</div>
  </body>
</html>
