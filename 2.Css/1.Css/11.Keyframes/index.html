<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Анимацияҳо бо Keyframes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CSS Анимацияҳо бо Keyframes</h1>

    <!-- Fade In -->
    <div class="box fade-in">Fade In (ҳафтаф)</div>

    <!-- Slide Left -->
    <div class="box slide-left">Slide Left</div>

    <!-- Slide Right -->
    <div class="box slide-right">Slide Right</div>

    <!-- Bounce -->
    <div class="box bounce">Bounce</div>

    <!-- Rotate -->
    <div class="box rotate">Rotate</div>

    <!-- Scale -->
    <div class="box scale">Scale</div>

    <!-- Color Change -->
    <div class="box color-change">Color Change</div>

    <!-- Pulse -->
    <div class="box pulse">Pulse</div>

    <!-- Shake -->
    <div class="box shake">Shake</div>
  </body>
</html>
