<!DOCTYPE html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position Мисол</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Position Мисолҳо</h1>

    <!-- Static -->
    <div class="position-static">Position: static (стандартӣ)</div>

    <!-- Relative -->
    <div class="position-relative">Position: relative (нисбат ба асл)</div>

    <!-- Absolute -->
    <div class="parent-absolute">
      Parent бо position: relative
      <div class="position-absolute">Position: absolute (нисбат ба parent)</div>
    </div>

    <!-- Fixed -->
    <div class="position-fixed">Position: fixed (нисбат ба экран)</div>

    <!-- Sticky -->
    <p style="margin-top: 500px">Скрол кунед, то sticky-ро бинед:</p>
    <div class="position-sticky">Position: sticky (лағжанда)</div>

    <p style="margin-bottom: 800px">Пойгоҳ барои скрол</p>
  </body>
</html>
