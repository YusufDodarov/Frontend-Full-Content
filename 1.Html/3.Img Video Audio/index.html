<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Img Video and Audio</title>
  </head>
  <body>
    <img
      width="200px"
      height="150"
      src="../3.Img Video Audio/img/image.png"
      alt="this is a picture"
    />
    <img
      width="200px"
      height="150"
      src="../3.Img Video Audio/img/image copy.png"
      alt="this is a picture"
    />
    <br />
    <video
      src="video/o4a3yIVEBOLNCARxwifrAnQO9iqaBzCCb3CIJ4.mp4"
      controls
      width="300px"
      height="200px"
      muted
      loop
      poster="img/image.png"
      disablePictureInPicture
      controlsList="nodownload"
    ></video>
    <!-- 1.autoplay худкор 2.muted бе овоз 3.loop баъд аз тамом шудани видёо худкор боз 
     видёо пайдо мешавад  -->
    <br /><br />
    <audio
      src="audio/— Idea 10 - Gibran Alcocer (Piano Solo) (online-audio-converter.com) (www.lightaudio.ru).mp3"
      controls
      loop
      muted
      controlsList="nodownload"
    ></audio>
    <img
      width="600px"
      height="400px"
      src="https://carconfigurator.ferrari.com/rt-assets/data/cars/296gtb/ui/splashpage.jpg"
      alt=""
    />
  </body>
</html>
