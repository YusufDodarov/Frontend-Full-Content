<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="https://example.com" method="post" autocomplete="on">
      <label for="name">Name:</label>
      <input type="text" id="name" required placeholder="Enter your name" />
      <br /><br />
      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        required
        placeholder="Enter your password"
      />
      <input type="checkbox" /><br />
      <input type="color" /><br />
      <input type="date" /><br /><br />
      <input type="datetime-local" /><br /><br />
      <input
        type="image"
        src="/3.Img Video Audio/img/image copy.png"
      /><br /><br />
      <input type="file" /><br /><br />
      <input type="month" /><br /><br />
      <input type="number" /><br /><br />
      <input type="radio" name="state" /><br /><br />
      <input type="radio" name="state" /><br /><br />
      <input type="range" /><br /><br />
      <input type="search" placeholder="search" /><br /><br />
      <input type="reset" /><br /><br />
      <input type="time" /><br /><br />
      <input type="week" /><br /><br />
      <input type="text" disabled />
      <input type="submit" value="Submit" aria-label="Submit Form" />
    </form>
  </body>
</html>
